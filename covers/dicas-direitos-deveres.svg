<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D2D50"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#F0C84A"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative glow circle -->
  <circle cx="950" cy="315" r="300" fill="#D4A017" opacity="0.06"/>
  <circle cx="950" cy="315" r="200" fill="#D4A017" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="6" height="310" rx="3" fill="url(#gold)"/>

  <!-- Building illustration (right side) -->
  <g transform="translate(750, 80)" opacity="0.18">
    <!-- Building 1 (tall) -->
    <rect x="160" y="60" width="90" height="390" rx="4" fill="#D4A017"/>
    <!-- Windows building 1 -->
    <rect x="172" y="80" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="202" y="80" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="172" y="106" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="202" y="106" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="172" y="132" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="202" y="132" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="172" y="158" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="202" y="158" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="172" y="184" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="202" y="184" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="172" y="210" width="20" height="14" rx="2" fill="#D4A017" opacity="0.8"/>
    <rect x="202" y="210" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="172" y="236" width="20" height="14" rx="2" fill="#1A1A2E"/>
    <rect x="202" y="236" width="20" height="14" rx="2" fill="#D4A017" opacity="0.8"/>
    <!-- Building 2 (medium) -->
    <rect x="60" y="140" width="80" height="310" rx="4" fill="#F0C84A"/>
    <rect x="72" y="160" width="16" height="12" rx="2" fill="#1A1A2E"/>
    <rect x="96" y="160" width="16" height="12" rx="2" fill="#1A1A2E"/>
    <rect x="72" y="184" width="16" height="12" rx="2" fill="#1A1A2E"/>
    <rect x="96" y="184" width="16" height="12" rx="2" fill="#1A1A2E"/>
    <rect x="72" y="208" width="16" height="12" rx="2" fill="#F0C84A" opacity="0.7"/>
    <rect x="96" y="208" width="16" height="12" rx="2" fill="#1A1A2E"/>
    <rect x="72" y="232" width="16" height="12" rx="2" fill="#1A1A2E"/>
    <rect x="96" y="232" width="16" height="12" rx="2" fill="#F0C84A" opacity="0.7"/>
    <!-- Building 3 (small) -->
    <rect x="270" y="200" width="70" height="250" rx="4" fill="#B8880D"/>
    <rect x="282" y="218" width="14" height="10" rx="2" fill="#1A1A2E"/>
    <rect x="304" y="218" width="14" height="10" rx="2" fill="#1A1A2E"/>
    <rect x="282" y="238" width="14" height="10" rx="2" fill="#B8880D" opacity="0.7"/>
    <rect x="304" y="238" width="14" height="10" rx="2" fill="#1A1A2E"/>
    <!-- Ground -->
    <rect x="0" y="450" width="380" height="8" rx="4" fill="#D4A017" opacity="0.5"/>
  </g>

  <!-- Gold tag -->
  <rect x="112" y="160" width="180" height="36" rx="18" fill="url(#gold)"/>
  <text x="202" y="183" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1A1A2E" text-anchor="middle" letter-spacing="2">DICAS SEJAAN</text>

  <!-- Main title -->
  <text x="112" y="270" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-1">5 Direitos e</text>
  <text x="112" y="345" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Deveres do</text>
  <text x="112" y="420" font-family="Georgia, serif" font-size="62" font-weight="700" fill="url(#gold)" letter-spacing="-1">Condômino</text>

  <!-- Subtitle -->
  <text x="112" y="478" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.6">O que todo morador precisa saber para uma</text>
  <text x="112" y="504" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.6">convivência harmoniosa no condomínio.</text>

  <!-- Bottom bar -->
  <rect x="0" y="565" width="1200" height="65" fill="#D4A017" opacity="0.12"/>
  <rect x="0" y="565" width="1200" height="2" fill="url(#gold)" opacity="0.4"/>

  <!-- Logo text in footer -->
  <text x="112" y="606" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#D4A017" letter-spacing="2">SEJAAN</text>
  <text x="215" y="606" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.4">Administradora</text>
  <text x="1088" y="606" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.35" text-anchor="middle">sejaanadministradora.com.br</text>

  <!-- 5 dots decoration -->
  <circle cx="112" cy="536" r="4" fill="#D4A017"/>
  <circle cx="128" cy="536" r="4" fill="#D4A017" opacity="0.6"/>
  <circle cx="144" cy="536" r="4" fill="#D4A017" opacity="0.4"/>
  <circle cx="160" cy="536" r="4" fill="#D4A017" opacity="0.2"/>
  <circle cx="176" cy="536" r="4" fill="#D4A017" opacity="0.1"/>
</svg>
